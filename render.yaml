services:
  - type: web
    name: remedi-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PROTECTED_IAM_USERS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DISCORD_FEEDBACK_WEBHOOK
        sync: false
      - key: AWS_DEFAULT_REGION
        sync: false
      - key: REDIS_URL
        fromService:
          name: remedi-redis
          type: redis
          property: connectionString

  - type: worker
    name: remedi-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A worker worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        sync: false
      - key: REDIS_URL
        fromService:
          name: remedi-redis
          type: redis
          property: connectionString

  - type: redis
    name: remedi-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: remedi-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
